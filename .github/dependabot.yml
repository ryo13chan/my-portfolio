version: 2
updates:
  # npm / pnpm の依存パッケージ
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # minor / patch はまとめて 1 つの PR に（major は個別 PR で慎重にレビュー）
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions のバージョン
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
